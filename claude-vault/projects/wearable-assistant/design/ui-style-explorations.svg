<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1800" font-family="-apple-system, 'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d12"/>
      <stop offset="100%" stop-color="#050507"/>
    </linearGradient>
  </defs>
  <rect width="1500" height="1800" fill="url(#bgGrad)"/>

  <text x="750" y="50" fill="#ddd" font-size="24" text-anchor="middle" letter-spacing="3" font-weight="300">ВЫБОР ЭСТЕТИКИ · 4 СОВРЕМЕННЫХ НАПРАВЛЕНИЯ 2026</text>
  <text x="750" y="80" fill="#666" font-size="14" text-anchor="middle">тот же экран — «утро» — в разных языках</text>

  <!-- ╔══════════════════════ STYLE 1: APPLE LIQUID GLASS ══════════════════════╗ -->
  <g transform="translate(120,160)">
    <text x="300" y="-20" fill="#7fd0ff" font-size="20" letter-spacing="3" font-weight="600">A · LIQUID GLASS</text>
    <text x="0" y="0" fill="#888" font-size="13">Прозрачное стекло, переливы под контент. Apple iOS 26 / visionOS.</text>
    <text x="0" y="20" fill="#666" font-size="12">Динамический фон, specular highlights, ощущение «настоящего материала».</text>

    <!-- Colorful background that glass overlays -->
    <defs>
      <radialGradient id="lg-bg" cx="0.3" cy="0.4" r="0.7">
        <stop offset="0%" stop-color="#ff9a4e"/>
        <stop offset="40%" stop-color="#d35aa0"/>
        <stop offset="80%" stop-color="#5b6fe6"/>
        <stop offset="100%" stop-color="#1a1a3a"/>
      </radialGradient>
      <clipPath id="lg-clip"><circle cx="300" cy="300" r="248"/></clipPath>
      <filter id="lg-blur"><feGaussianBlur stdDeviation="40"/></filter>
    </defs>

    <!-- Watch bezel -->
    <circle cx="300" cy="300" r="250" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="3"/>

    <!-- Colorful "wallpaper" underneath -->
    <rect x="50" y="50" width="500" height="500" fill="url(#lg-bg)" clip-path="url(#lg-clip)"/>

    <!-- GLASS CARD 1: Time -->
    <g>
      <rect x="100" y="140" width="400" height="130" rx="40"
            fill="white" fill-opacity="0.12"
            stroke="white" stroke-opacity="0.25" stroke-width="1.5"/>
      <!-- glass highlight -->
      <rect x="100" y="140" width="400" height="55" rx="40" fill="white" fill-opacity="0.06"/>
      <text x="300" y="225" fill="#fff" font-size="68" font-weight="200" text-anchor="middle" letter-spacing="-2">07:32</text>
    </g>

    <!-- Greeting pill -->
    <g>
      <rect x="170" y="295" width="260" height="46" rx="23"
            fill="white" fill-opacity="0.15"
            stroke="white" stroke-opacity="0.3" stroke-width="1"/>
      <text x="300" y="324" fill="#fff" font-size="17" text-anchor="middle" font-weight="500">доброе утро, Андрей</text>
    </g>

    <!-- Weather glass tile -->
    <g>
      <rect x="120" y="365" width="170" height="100" rx="28"
            fill="white" fill-opacity="0.1"
            stroke="white" stroke-opacity="0.2" stroke-width="1"/>
      <text x="205" y="402" fill="#fff" font-size="32" font-weight="200" text-anchor="middle">+18°</text>
      <text x="205" y="430" fill="#fff" fill-opacity="0.7" font-size="11" text-anchor="middle">ясно</text>
      <text x="205" y="448" fill="#fff" fill-opacity="0.5" font-size="10" text-anchor="middle">Москва</text>
    </g>

    <!-- Calendar glass tile -->
    <g>
      <rect x="310" y="365" width="170" height="100" rx="28"
            fill="white" fill-opacity="0.1"
            stroke="white" stroke-opacity="0.2" stroke-width="1"/>
      <text x="395" y="395" fill="#fff" fill-opacity="0.7" font-size="11" text-anchor="middle" letter-spacing="2">СЕГОДНЯ</text>
      <text x="395" y="425" fill="#fff" font-size="22" font-weight="200" text-anchor="middle">3 встречи</text>
      <text x="395" y="448" fill="#fff" fill-opacity="0.6" font-size="11" text-anchor="middle">ближайшая 11:00</text>
    </g>
  </g>

  <!-- ╔══════════════════════ STYLE 2: SIRI GLOW / ANTHROPIC ══════════════════════╗ -->
  <g transform="translate(800,160)">
    <text x="300" y="-20" fill="#c084fc" font-size="20" letter-spacing="3" font-weight="600">B · SIRI GLOW</text>
    <text x="0" y="0" fill="#888" font-size="13">Светящийся «живой» ассистент. Apple Intelligence / Arc Browser / Anthropic.</text>
    <text x="0" y="20" fill="#666" font-size="12">Дышащий орб, неоновое свечение по контурам, тонкая типографика.</text>

    <!-- Bezel -->
    <circle cx="300" cy="300" r="250" fill="#050508" stroke="#15151c" stroke-width="3"/>

    <!-- Glow halo around -->
    <defs>
      <radialGradient id="siri-glow" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0%" stop-color="#c084fc" stop-opacity="0"/>
        <stop offset="60%" stop-color="#c084fc" stop-opacity="0.15"/>
        <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="siri-orb">
        <stop offset="0%" stop-color="#fff" stop-opacity="0.95"/>
        <stop offset="25%" stop-color="#f4a8ff" stop-opacity="0.8"/>
        <stop offset="55%" stop-color="#7d5cf6" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#7d5cf6" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="siri-orb2">
        <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
        <stop offset="50%" stop-color="#e5c5ff" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#a060ff" stop-opacity="0.7"/>
      </radialGradient>
      <clipPath id="siri-clip"><circle cx="300" cy="300" r="248"/></clipPath>
    </defs>

    <rect x="50" y="50" width="500" height="500" fill="url(#siri-glow)" clip-path="url(#siri-clip)"/>

    <!-- Live orb (top) -->
    <g>
      <circle cx="300" cy="195" r="90" fill="url(#siri-orb)"/>
      <circle cx="300" cy="195" r="55" fill="url(#siri-orb2)"/>
      <circle cx="290" cy="180" r="14" fill="#fff" opacity="0.9"/>
    </g>

    <!-- Glowing time -->
    <g>
      <text x="300" y="335" fill="#fff" font-size="42" font-weight="200" text-anchor="middle" letter-spacing="-1"
            style="filter: drop-shadow(0 0 8px #c084fc);">7:32</text>
    </g>

    <!-- Greeting -->
    <text x="300" y="375" fill="#e8d5ff" font-size="16" font-weight="300" text-anchor="middle" letter-spacing="0.5">доброе утро, Андрей</text>

    <!-- Glowing pill at bottom -->
    <g>
      <rect x="150" y="410" width="300" height="50" rx="25"
            fill="none"
            stroke="#c084fc" stroke-width="1.5"
            stroke-opacity="0.6"
            style="filter: drop-shadow(0 0 6px #c084fc);"/>
      <circle cx="180" cy="435" r="4" fill="#c084fc">
      </circle>
      <text x="220" y="441" fill="#c084fc" font-size="13" letter-spacing="2">+18° · 3 встречи · ясно</text>
    </g>

    <!-- Tiny status dots -->
    <circle cx="280" cy="490" r="2" fill="#666"/>
    <circle cx="295" cy="490" r="2" fill="#c084fc"/>
    <circle cx="310" cy="490" r="2" fill="#666"/>
    <circle cx="325" cy="490" r="2" fill="#666"/>
  </g>

  <!-- ╔══════════════════════ STYLE 3: BENTO SPATIAL ══════════════════════╗ -->
  <g transform="translate(120,820)">
    <text x="300" y="-20" fill="#7ad77a" font-size="20" letter-spacing="3" font-weight="600">C · BENTO SPATIAL</text>
    <text x="0" y="0" fill="#888" font-size="13">Модульные карточки разного размера. Apple Vision Pro / visionOS.</text>
    <text x="0" y="20" fill="#666" font-size="12">Глубина, тени, ощущение реального предмета. Контент как «коробочки».</text>

    <!-- Bezel -->
    <circle cx="300" cy="300" r="250" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="3"/>

    <defs>
      <linearGradient id="bento-time" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#1d2330"/>
        <stop offset="100%" stop-color="#0f1218"/>
      </linearGradient>
      <linearGradient id="bento-weather" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#fb923c"/>
        <stop offset="100%" stop-color="#c2410c"/>
      </linearGradient>
      <linearGradient id="bento-cal" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#22d3a5"/>
        <stop offset="100%" stop-color="#057a4e"/>
      </linearGradient>
      <linearGradient id="bento-mood" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#a78bfa"/>
        <stop offset="100%" stop-color="#5b21b6"/>
      </linearGradient>
      <clipPath id="bento-clip"><circle cx="300" cy="300" r="248"/></clipPath>
    </defs>

    <g clip-path="url(#bento-clip)">
      <!-- Time card (big, top) -->
      <rect x="120" y="115" width="360" height="135" rx="28" fill="url(#bento-time)"
            stroke="#2a3245" stroke-width="1"/>
      <text x="150" y="160" fill="#9ca3af" font-size="11" letter-spacing="2">ВТ · 17 МАЯ · 2026</text>
      <text x="150" y="225" fill="#fff" font-size="68" font-weight="600" letter-spacing="-3">07:32</text>
      <!-- subtle highlight -->
      <rect x="120" y="115" width="360" height="50" rx="28" fill="white" fill-opacity="0.03"/>

      <!-- Weather card (left) -->
      <rect x="120" y="265" width="170" height="135" rx="24" fill="url(#bento-weather)"
            stroke="#9a3412" stroke-width="1"/>
      <circle cx="155" cy="295" r="14" fill="#fff" opacity="0.95"/>
      <text x="205" y="305" fill="#fff" font-size="13" font-weight="500">ясно</text>
      <text x="135" y="375" fill="#fff" font-size="42" font-weight="700">+18°</text>

      <!-- Calendar card (right) -->
      <rect x="305" y="265" width="175" height="135" rx="24" fill="url(#bento-cal)"
            stroke="#047857" stroke-width="1"/>
      <text x="320" y="295" fill="#fff" font-size="11" letter-spacing="2" opacity="0.8">ВСТРЕЧИ</text>
      <text x="320" y="343" fill="#fff" font-size="48" font-weight="700">3</text>
      <text x="320" y="380" fill="#fff" font-size="12" opacity="0.85">11:00 · Иванов</text>

      <!-- Mood / greeting (bottom wide) -->
      <rect x="120" y="415" width="360" height="60" rx="22" fill="url(#bento-mood)"
            stroke="#5b21b6" stroke-width="1"/>
      <text x="300" y="453" fill="#fff" font-size="16" text-anchor="middle" font-weight="500">доброе утро, Андрей  →</text>
    </g>
  </g>

  <!-- ╔══════════════════════ STYLE 4: BRUTALIST MONO ══════════════════════╗ -->
  <g transform="translate(800,820)">
    <text x="300" y="-20" fill="#fff" font-size="20" letter-spacing="3" font-weight="700" font-family="'JetBrains Mono', 'IBM Plex Mono', monospace">D · BRUTALIST</text>
    <text x="0" y="0" fill="#888" font-size="13" font-family="'JetBrains Mono', monospace">Огромные числа, mono-шрифт. Linear / Vercel / Arc command bar.</text>
    <text x="0" y="20" fill="#666" font-size="12" font-family="'JetBrains Mono', monospace">Чёткие блоки, ASCII-вайб, ноль украшательств — только данные.</text>

    <!-- Bezel -->
    <circle cx="300" cy="300" r="250" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="3"/>

    <defs>
      <clipPath id="brut-clip"><circle cx="300" cy="300" r="248"/></clipPath>
    </defs>

    <g clip-path="url(#brut-clip)" font-family="'JetBrains Mono', 'IBM Plex Mono', monospace">
      <!-- Top label -->
      <text x="120" y="155" fill="#555" font-size="11" letter-spacing="3">// MORNING/17.05.26</text>

      <!-- Huge time -->
      <text x="300" y="270" fill="#fff" font-size="98" font-weight="700" text-anchor="middle" letter-spacing="-4">07:32</text>

      <!-- Divider lines -->
      <line x1="100" y1="298" x2="500" y2="298" stroke="#333" stroke-width="1"/>

      <!-- Data block -->
      <text x="120" y="335" fill="#666" font-size="13">USER....: ANDREY</text>
      <text x="120" y="358" fill="#666" font-size="13">TEMP....: +18°C MOSCOW</text>
      <text x="120" y="381" fill="#666" font-size="13">EVENTS..: 03 / NEXT 11:00</text>
      <text x="120" y="404" fill="#666" font-size="13">ENERGY..: ████████░░ 82%</text>

      <line x1="100" y1="425" x2="500" y2="425" stroke="#333" stroke-width="1"/>

      <!-- Status bar -->
      <text x="120" y="455" fill="#7ad77a" font-size="13">▸ READY</text>
      <text x="300" y="455" fill="#444" font-size="11">|</text>
      <text x="320" y="455" fill="#888" font-size="11">say "брифинг" to start</text>

      <!-- Tag at the bottom right of the circle -->
      <text x="450" y="155" fill="#f4b942" font-size="11" letter-spacing="2" text-anchor="end">[v2.1.0]</text>
    </g>
  </g>

  <!-- ╔══════════════════════ COMPARISON FOOTER ══════════════════════╗ -->
  <g transform="translate(120, 1530)">
    <text x="0" y="0" fill="#fff" font-size="18" font-weight="500" letter-spacing="1">Чем эти стили реально отличаются</text>

    <g transform="translate(0,30)">
      <text x="0" y="20" fill="#7fd0ff" font-size="14" font-weight="600">A. LIQUID GLASS</text>
      <text x="0" y="42" fill="#aaa" font-size="12">премиум-Apple. Глубина через прозрачность. Дорогой,</text>
      <text x="0" y="60" fill="#aaa" font-size="12">тёплый, «iPhone-вайб». Сложнее реализовать на ESP32.</text>
    </g>

    <g transform="translate(340,30)">
      <text x="0" y="20" fill="#c084fc" font-size="14" font-weight="600">B. SIRI GLOW</text>
      <text x="0" y="42" fill="#aaa" font-size="12">«живой» ассистент. Свечение, тонкость, мистика.</text>
      <text x="0" y="60" fill="#aaa" font-size="12">Минимум данных, максимум присутствия. AMOLED раскрывает.</text>
    </g>

    <g transform="translate(680,30)">
      <text x="0" y="20" fill="#7ad77a" font-size="14" font-weight="600">C. BENTO SPATIAL</text>
      <text x="0" y="42" fill="#aaa" font-size="12">Vision Pro / новая Apple. Цветные карточки-плитки.</text>
      <text x="0" y="60" fill="#aaa" font-size="12">Глаз быстро находит блок. Куча инфы на одном экране.</text>
    </g>

    <g transform="translate(1020,30)">
      <text x="0" y="20" fill="#fff" font-size="14" font-weight="700" font-family="'JetBrains Mono', monospace">D. BRUTALIST</text>
      <text x="0" y="42" fill="#aaa" font-size="12" font-family="'JetBrains Mono', monospace">Linear / Vercel / Arc. Mono, без украшений.</text>
      <text x="0" y="60" fill="#aaa" font-size="12" font-family="'JetBrains Mono', monospace">Инженерный, технологичный, для своих. Очень cool.</text>
    </g>
  </g>

  <text x="750" y="1750" fill="#666" font-size="13" text-anchor="middle">скажи букву (A / B / C / D) — и я пересоберу все 44 экрана в выбранной эстетике</text>
</svg>
