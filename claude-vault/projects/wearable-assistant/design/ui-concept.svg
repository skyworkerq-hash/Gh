<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1860 1280" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <!-- Background -->
  <rect width="1860" height="1280" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="930" y="50" fill="#888" font-size="22" text-anchor="middle" letter-spacing="2">ОФИСНЫЙ AI-ХАБ · WAVESHARE ESP32-P4 · 3.4" КРУГЛЫЙ 800×800 · КОНЦЕПЦИЯ ИНТЕРФЕЙСА</text>

  <!-- ============================================ ROW 1 ============================================ -->

  <!-- SCREEN 1: AMBIENT / IDLE -->
  <g transform="translate(150,140)">
    <text x="200" y="-20" fill="#888" font-size="16" text-anchor="middle">1. ОКРУЖАЮЩИЙ РЕЖИМ</text>
    <text x="200" y="0" fill="#555" font-size="12" text-anchor="middle">когда никто не говорит</text>

    <circle cx="200" cy="220" r="200" fill="#000" stroke="#1a1a1a" stroke-width="2"/>

    <!-- Time -->
    <text x="200" y="195" fill="#ffffff" font-size="78" font-weight="200" text-anchor="middle" letter-spacing="-2">14:32</text>
    <text x="200" y="225" fill="#666" font-size="14" text-anchor="middle" letter-spacing="3">ВТ · 17 МАЯ</text>

    <!-- Status orb -->
    <circle cx="200" cy="280" r="6" fill="#3aa9ff"/>

    <!-- Bottom info -->
    <text x="200" y="330" fill="#888" font-size="15" text-anchor="middle">3 заявки · 1 ждёт документов</text>
    <text x="200" y="355" fill="#444" font-size="13" text-anchor="middle">погода в Москве +18°  ясно</text>

    <!-- Weather glyph top -->
    <text x="200" y="80" fill="#666" font-size="18" text-anchor="middle">☀</text>
  </g>

  <!-- SCREEN 2: LISTENING -->
  <g transform="translate(580,140)">
    <text x="200" y="-20" fill="#888" font-size="16" text-anchor="middle">2. СЛУШАЮ</text>
    <text x="200" y="0" fill="#555" font-size="12" text-anchor="middle">после слова активации</text>

    <circle cx="200" cy="220" r="200" fill="#000" stroke="#1a1a1a" stroke-width="2"/>

    <!-- Pulsing rings -->
    <circle cx="200" cy="220" r="195" fill="none" stroke="#f4b942" stroke-width="2" opacity="0.9"/>
    <circle cx="200" cy="220" r="175" fill="none" stroke="#f4b942" stroke-width="2" opacity="0.5"/>
    <circle cx="200" cy="220" r="155" fill="none" stroke="#f4b942" stroke-width="2" opacity="0.25"/>

    <!-- Mic icon -->
    <rect x="187" y="180" width="26" height="40" rx="13" fill="#f4b942"/>
    <path d="M 175 215 Q 200 245 225 215" stroke="#f4b942" stroke-width="3" fill="none"/>
    <line x1="200" y1="245" x2="200" y2="265" stroke="#f4b942" stroke-width="3"/>
    <line x1="190" y1="265" x2="210" y2="265" stroke="#f4b942" stroke-width="3"/>

    <!-- Realtime transcript -->
    <text x="200" y="305" fill="#ffffff" font-size="17" text-anchor="middle" font-style="italic">«найди мне реквизиты</text>
    <text x="200" y="328" fill="#ffffff" font-size="17" text-anchor="middle" font-style="italic">ООО Ромашка...»</text>

    <text x="200" y="370" fill="#666" font-size="11" text-anchor="middle" letter-spacing="2">СЛУШАЮ</text>
  </g>

  <!-- SCREEN 3: CLIENT CARD -->
  <g transform="translate(1010,140)">
    <text x="200" y="-20" fill="#888" font-size="16" text-anchor="middle">3. КАРТОЧКА КЛИЕНТА</text>
    <text x="200" y="0" fill="#555" font-size="12" text-anchor="middle">главный рабочий экран</text>

    <circle cx="200" cy="220" r="200" fill="#000" stroke="#1a1a1a" stroke-width="2"/>

    <!-- Company name -->
    <text x="200" y="100" fill="#ffffff" font-size="22" font-weight="600" text-anchor="middle">ООО «РОМАШКА»</text>
    <text x="200" y="122" fill="#666" font-size="11" text-anchor="middle">ИНН 7708123456 · КПП 770801001</text>

    <!-- Big number -->
    <text x="200" y="200" fill="#f4b942" font-size="42" font-weight="200" text-anchor="middle">28 млн ₽</text>
    <text x="200" y="222" fill="#666" font-size="12" text-anchor="middle" letter-spacing="2">ВЫРУЧКА ЗА 2025</text>

    <!-- Mini stats row -->
    <text x="120" y="262" fill="#999" font-size="13" text-anchor="middle">прибыль</text>
    <text x="120" y="280" fill="#ffffff" font-size="16" text-anchor="middle" font-weight="500">2,1 млн</text>

    <text x="200" y="262" fill="#999" font-size="13" text-anchor="middle">риск</text>
    <text x="200" y="280" fill="#7ad77a" font-size="16" text-anchor="middle" font-weight="500">низкий</text>

    <text x="280" y="262" fill="#999" font-size="13" text-anchor="middle">опыт</text>
    <text x="280" y="280" fill="#ffffff" font-size="16" text-anchor="middle" font-weight="500">4 года</text>

    <!-- Bank match -->
    <text x="200" y="325" fill="#666" font-size="11" text-anchor="middle" letter-spacing="2">ПОДХОДИТ ПОД БАНКИ</text>
    <text x="200" y="355" fill="#7ad77a" font-size="16" text-anchor="middle">✓ Сбер  ✓ Альфа  ✓ ПСБ  ✗ ВТБ</text>
  </g>

  <!-- SCREEN 4: CALL TRANSCRIPT -->
  <g transform="translate(1440,140)">
    <text x="200" y="-20" fill="#888" font-size="16" text-anchor="middle">4. ТРАНСКРИПТ ЗВОНКА</text>
    <text x="200" y="0" fill="#555" font-size="12" text-anchor="middle">в реальном времени</text>

    <circle cx="200" cy="220" r="200" fill="#000" stroke="#1a1a1a" stroke-width="2"/>

    <!-- Header -->
    <circle cx="200" cy="85" r="4" fill="#e74c3c"/>
    <text x="215" y="90" fill="#e74c3c" font-size="11" letter-spacing="2">REC · 04:22</text>
    <text x="200" y="115" fill="#ffffff" font-size="16" font-weight="500" text-anchor="middle">Петров · ООО Альфа-Строй</text>

    <!-- Dialog -->
    <text x="55" y="155" fill="#666" font-size="10">Петров:</text>
    <text x="55" y="172" fill="#ddd" font-size="12">— Сумма гарантии 5 миллионов,</text>
    <text x="55" y="188" fill="#ddd" font-size="12">срок 6 месяцев</text>

    <text x="55" y="218" fill="#666" font-size="10">Андрей:</text>
    <text x="55" y="235" fill="#ddd" font-size="12">— Принял, посмотрю по Сберу</text>
    <text x="55" y="251" fill="#ddd" font-size="12">и Альфе, ответ к завтра</text>

    <!-- Detected action -->
    <rect x="60" y="280" width="280" height="60" rx="8" fill="#1a1a1a" stroke="#f4b942" stroke-width="1"/>
    <text x="75" y="302" fill="#f4b942" font-size="11" letter-spacing="2">✓ DETECTED ACTION</text>
    <text x="75" y="322" fill="#ffffff" font-size="12">Ответ клиенту до 18.05</text>
    <text x="75" y="337" fill="#888" font-size="11">→ добавить напоминание</text>
  </g>

  <!-- ============================================ ROW 2 ============================================ -->

  <!-- SCREEN 5: MORNING BRIEFING -->
  <g transform="translate(150,720)">
    <text x="200" y="-20" fill="#888" font-size="16" text-anchor="middle">5. УТРЕННИЙ БРИФИНГ</text>
    <text x="200" y="0" fill="#555" font-size="12" text-anchor="middle">в 9:00 сам выходит на связь</text>

    <circle cx="200" cy="220" r="200" fill="#000" stroke="#1a1a1a" stroke-width="2"/>

    <!-- Time bar -->
    <text x="200" y="80" fill="#3aa9ff" font-size="11" text-anchor="middle" letter-spacing="3">УТРОМ В 09:00</text>

    <!-- Greeting -->
    <text x="200" y="115" fill="#ffffff" font-size="19" text-anchor="middle" font-weight="500">Доброе утро, Андрей</text>

    <!-- Numbers row -->
    <text x="115" y="170" fill="#f4b942" font-size="32" font-weight="200" text-anchor="middle">3</text>
    <text x="115" y="188" fill="#666" font-size="10" text-anchor="middle">ЗАЯВКИ</text>

    <text x="200" y="170" fill="#f4b942" font-size="32" font-weight="200" text-anchor="middle">7</text>
    <text x="200" y="188" fill="#666" font-size="10" text-anchor="middle">ТЕНДЕРОВ</text>

    <text x="285" y="170" fill="#e74c3c" font-size="32" font-weight="200" text-anchor="middle">1</text>
    <text x="285" y="188" fill="#666" font-size="10" text-anchor="middle">АЛЕРТ</text>

    <!-- Today schedule -->
    <line x1="80" y1="218" x2="320" y2="218" stroke="#222" stroke-width="1"/>
    <text x="80" y="245" fill="#666" font-size="11">11:00</text>
    <text x="120" y="245" fill="#ddd" font-size="11">звонок с Ивановым</text>
    <text x="80" y="265" fill="#666" font-size="11">15:00</text>
    <text x="120" y="265" fill="#ddd" font-size="11">подача в ВТБ по Петрову</text>
    <text x="80" y="285" fill="#666" font-size="11">17:30</text>
    <text x="120" y="285" fill="#ddd" font-size="11">встреча — кафе у метро</text>

    <!-- Voice indicator -->
    <text x="200" y="345" fill="#888" font-size="11" text-anchor="middle">◉ ◉ ◉  проговариваю вслух</text>
  </g>

  <!-- SCREEN 6: TENDER ALERT (notification) -->
  <g transform="translate(580,720)">
    <text x="200" y="-20" fill="#888" font-size="16" text-anchor="middle">6. ВСПЛЫВАЕТ САМ</text>
    <text x="200" y="0" fill="#555" font-size="12" text-anchor="middle">фоновый мониторинг → алерт</text>

    <circle cx="200" cy="220" r="200" fill="#000" stroke="#1a1a1a" stroke-width="2"/>

    <!-- Alert tag -->
    <rect x="135" y="100" width="130" height="22" rx="11" fill="#f4b942"/>
    <text x="200" y="116" fill="#000" font-size="11" text-anchor="middle" font-weight="600" letter-spacing="2">НОВЫЙ ЛИД</text>

    <!-- Main info -->
    <text x="200" y="165" fill="#ffffff" font-size="30" font-weight="200" text-anchor="middle">8,4 млн ₽</text>
    <text x="200" y="190" fill="#666" font-size="13" text-anchor="middle">44-ФЗ · Татарстан · стройка</text>

    <!-- Winner -->
    <text x="200" y="225" fill="#aaa" font-size="13" text-anchor="middle">победитель:</text>
    <text x="200" y="248" fill="#ffffff" font-size="15" text-anchor="middle" font-weight="500">ООО «Строй-Сервис»</text>

    <!-- Scoring -->
    <line x1="80" y1="270" x2="320" y2="270" stroke="#222" stroke-width="1"/>
    <text x="200" y="293" fill="#999" font-size="11" text-anchor="middle">прогноз вероятности БГ</text>

    <!-- Progress arc-style indicator -->
    <text x="200" y="328" fill="#7ad77a" font-size="32" font-weight="300" text-anchor="middle">87%</text>

    <text x="200" y="365" fill="#666" font-size="11" text-anchor="middle">скажи «подробнее» чтобы открыть</text>
  </g>

  <!-- SCREEN 7: DOCUMENT PARSE -->
  <g transform="translate(1010,720)">
    <text x="200" y="-20" fill="#888" font-size="16" text-anchor="middle">7. РАЗБОР ДОГОВОРА</text>
    <text x="200" y="0" fill="#555" font-size="12" text-anchor="middle">PDF на Mac → таблица на круг</text>

    <circle cx="200" cy="220" r="200" fill="#000" stroke="#1a1a1a" stroke-width="2"/>

    <!-- Filename -->
    <text x="200" y="85" fill="#666" font-size="10" text-anchor="middle">📄 dogovor_romashka.pdf</text>

    <text x="200" y="112" fill="#ffffff" font-size="16" text-anchor="middle" font-weight="500">Реквизиты извлечены</text>

    <!-- Table rows -->
    <line x1="80" y1="135" x2="320" y2="135" stroke="#222" stroke-width="1"/>

    <text x="100" y="160" fill="#666" font-size="12">контрагент</text>
    <text x="300" y="160" fill="#ffffff" font-size="12" text-anchor="end">ООО Ромашка</text>

    <text x="100" y="185" fill="#666" font-size="12">ИНН</text>
    <text x="300" y="185" fill="#ffffff" font-size="12" text-anchor="end">7708123456</text>

    <text x="100" y="210" fill="#666" font-size="12">сумма</text>
    <text x="300" y="210" fill="#f4b942" font-size="13" text-anchor="end" font-weight="500">5 200 000 ₽</text>

    <text x="100" y="235" fill="#666" font-size="12">срок БГ</text>
    <text x="300" y="235" fill="#ffffff" font-size="12" text-anchor="end">12 мес</text>

    <text x="100" y="260" fill="#666" font-size="12">тип БГ</text>
    <text x="300" y="260" fill="#ffffff" font-size="12" text-anchor="end">исполнения</text>

    <text x="100" y="285" fill="#666" font-size="12">бенефициар</text>
    <text x="300" y="285" fill="#ffffff" font-size="12" text-anchor="end">Минстрой РТ</text>

    <line x1="80" y1="305" x2="320" y2="305" stroke="#222" stroke-width="1"/>

    <!-- Warning -->
    <text x="200" y="335" fill="#e74c3c" font-size="12" text-anchor="middle">⚠ дата подписания пустая</text>
    <text x="200" y="358" fill="#666" font-size="11" text-anchor="middle">скажи «спросить у клиента»</text>
  </g>

  <!-- SCREEN 8: ASSISTANT FACE -->
  <g transform="translate(1440,720)">
    <text x="200" y="-20" fill="#888" font-size="16" text-anchor="middle">8. ЛИЦО АССИСТЕНТА</text>
    <text x="200" y="0" fill="#555" font-size="12" text-anchor="middle">говорит / эмоция / реакция</text>

    <circle cx="200" cy="220" r="200" fill="#000" stroke="#1a1a1a" stroke-width="2"/>

    <!-- Orb gradient -->
    <defs>
      <radialGradient id="orbGrad">
        <stop offset="0%" stop-color="#fff7d4" stop-opacity="0.9"/>
        <stop offset="35%" stop-color="#f4b942" stop-opacity="0.7"/>
        <stop offset="70%" stop-color="#e09020" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#000" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <!-- Glow halo -->
    <circle cx="200" cy="215" r="120" fill="url(#orbGrad)"/>

    <!-- Inner orb -->
    <circle cx="200" cy="215" r="55" fill="#fff8e1" opacity="0.95"/>
    <circle cx="200" cy="215" r="40" fill="#f4b942"/>

    <!-- Speaking waveform -->
    <g transform="translate(200,310)">
      <rect x="-50" y="-3" width="5" height="6" rx="2" fill="#f4b942"/>
      <rect x="-38" y="-7" width="5" height="14" rx="2" fill="#f4b942"/>
      <rect x="-26" y="-12" width="5" height="24" rx="2" fill="#f4b942"/>
      <rect x="-14" y="-9" width="5" height="18" rx="2" fill="#f4b942"/>
      <rect x="-2" y="-15" width="5" height="30" rx="2" fill="#f4b942"/>
      <rect x="10" y="-10" width="5" height="20" rx="2" fill="#f4b942"/>
      <rect x="22" y="-13" width="5" height="26" rx="2" fill="#f4b942"/>
      <rect x="34" y="-8" width="5" height="16" rx="2" fill="#f4b942"/>
      <rect x="46" y="-4" width="5" height="8" rx="2" fill="#f4b942"/>
    </g>

    <text x="200" y="355" fill="#888" font-size="11" text-anchor="middle" letter-spacing="2">ГОВОРЮ</text>
  </g>

  <!-- ============================================ FOOTER NOTES ============================================ -->
  <g transform="translate(150,1180)">
    <text x="0" y="0" fill="#666" font-size="13">ПРИНЦИПЫ:</text>
    <text x="0" y="22" fill="#aaa" font-size="12">• Чёрный AMOLED-фон (пиксели физически выключены — меньше энергии и идёт глубокий чёрный).</text>
    <text x="0" y="42" fill="#aaa" font-size="12">• Янтарь/золото как акцент — деловой, тёплый, читается даже периферическим зрением.</text>
    <text x="0" y="62" fill="#aaa" font-size="12">• Один смысл — один экран. На круге не помещается больше одной главной сущности.</text>
    <text x="900" y="0" fill="#666" font-size="13">УПРАВЛЕНИЕ:</text>
    <text x="900" y="22" fill="#aaa" font-size="12">• Голос — основной канал. Тач — для подтверждений и листания.</text>
    <text x="900" y="42" fill="#aaa" font-size="12">• Свайп влево/вправо — карусель карточек. Тап — раскрыть детали.</text>
    <text x="900" y="62" fill="#aaa" font-size="12">• Боковая кнопка PWR — push-to-talk на тишине / отмена / выкл экрана.</text>
  </g>
</svg>
